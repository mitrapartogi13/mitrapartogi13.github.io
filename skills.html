  <style>
    /* ---- NAVBAR UTAMA ---- */
    .navbar {
      background-color: #000;
      margin: 0;
      border-radius: 0;
      border: none;
      width: 100%;
    }

    /* Tambah padding di .navbar-inner atau di .nav>li>a */
    .navbar .navbar-inner {
      padding: 10px 0;
      /* Ruang atas-bawah navbar */
    }

    .navbar .navbar-inner .container {
      text-align: center;
      margin: 0 auto;
      width: 100%;
      max-width: 100%;
    }

    .navbar .nav {
      float: none;
      display: inline-block;
    }

    .navbar .nav>li {
      float: none;
      display: inline-block;
      margin: 0 10px;
    }

    /* ---- MEDIA QUERY UNTUK MOBILE (max-width: 768px) ---- */
    @media (max-width: 768px) {

      /* Navbar tetap hitam dan melebar penuh */
      .navbar {
        background-color: #000 !important;
        margin: 0;
        padding: 0;
        width: 100%;
      }

      .navbar .nav {
        display: block;
        text-align: left;
        padding-left: 0;
      }

      .navbar .nav>li {
        display: block;
        margin: 0;
      }

      .navbar .nav>li>a {
        display: block;
        padding: 10px 15px;
      }

      body {
        background-color: #000 !important;
      }

      #particles-js {
        background-color: #000 !important;
      }
    }

    .container.profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 50px 0;
    }
  </style>
</head>

    document.addEventListener("DOMContentLoaded", function () {
